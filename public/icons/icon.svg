<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a22"/>
      <stop offset="100%" style="stop-color:#0d0d0f"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6ff7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="110" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- W lettermark -->
  <text x="256" y="320" 
    font-family="'Cabinet Grotesk', 'Plus Jakarta Sans', system-ui, sans-serif"
    font-size="280" font-weight="800" text-anchor="middle"
    fill="url(#text)" letter-spacing="-10">W</text>
  <!-- Accent dot -->
  <circle cx="370" cy="340" r="28" fill="url(#dot)"/>
</svg>
